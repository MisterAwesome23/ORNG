<style>
  :root {
    --bg: #FFFBF3;
    --bg-2: #F5EEDE;
    --ink: #1A1410;
    --ink-soft: #5C5148;
    --ink-mute: #9A8F82;
    --rule: #E3D9C4;
    --accent: #FF4F00;
    --accent-deep: #D93F00;
    --whatsapp: #1FAD5C;
    --whatsapp-deep: #178F4B;
    --paper: #FFFFFF;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; text-decoration: none; }

  /* ========== TOP BAR ========== */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 28px;
    border-bottom: 1px solid var(--rule);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .topbar-left {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .topbar-left a:hover { color: var(--accent); }
  .topbar-right {
    display: flex; align-items: center; gap: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .pill {
    padding: 8px 14px; border-radius: 999px;
    border: 1.5px solid var(--ink);
    transition: background .15s, color .15s;
  }
  .pill:hover { background: var(--ink); color: var(--bg); }
  .pill.solid { background: var(--ink); color: var(--bg); }
  .pill.solid:hover { background: var(--accent); border-color: var(--accent); }

  /* ========== PROFILE HEADER ========== */
  .profile {
    max-width: 620px;
    margin: 0 auto;
    padding: 48px 24px 16px;
    text-align: center;
  }
  .avatar {
    width: 104px; height: 104px;
    border-radius: 50%;
    margin: 0 auto 20px;
    background: var(--accent);
    display: grid; place-items: center;
    border: 3px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    overflow: hidden;
  }
  .avatar-logo {
    font-family: 'Anton', sans-serif;
    font-size: 44px;
    color: var(--bg);
    -webkit-text-stroke: 1.5px var(--ink);
    paint-order: stroke fill;
    line-height: 1;
    letter-spacing: 0.02em;
  }
  .profile h1 {
    font-family: 'Anton', sans-serif;
    font-size: 38px;
    letter-spacing: 0.01em;
    color: var(--ink);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .profile .tag {
    font-size: 15px;
    color: var(--ink-soft);
    margin-bottom: 28px;
    line-height: 1.5;
  }
  .profile .tag a {
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .lr-legit { color: var(--whatsapp); }
  .lr-reach { color: var(--ink); }

  .subscribe-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--ink);
    color: var(--bg);
    padding: 14px 42px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 15px;
    border: 2px solid var(--ink);
    box-shadow: 4px 4px 0 var(--accent);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .subscribe-btn:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--accent); }
  .subscribe-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--accent); }
  .subscribe-btn svg { width: 16px; height: 16px; }

  /* ========== TABS ========== */
  .tabs {
    max-width: 760px;
    margin: 40px auto 0;
    padding: 0 24px;
    display: flex; justify-content: center; gap: 28px;
    border-bottom: 1px solid var(--rule);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mute);
    padding: 14px 2px;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    cursor: pointer;
  }
  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
    font-weight: 700;
  }
  .tab:hover:not(.active) { color: var(--ink-soft); }

  /* ========== EVENTS SECTION ========== */
  .events-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 36px 24px 80px;
  }
  .events-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px;
  }
  .events-header h2 {
    font-family: 'Anton', sans-serif;
    font-size: 32px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .events-controls {
    display: flex; align-items: center; gap: 10px;
  }
  .filter {
    position: relative;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--bg);
    border: 1.5px solid var(--rule);
    padding: 8px 14px 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: border-color .15s;
  }
  .filter:hover { border-color: var(--ink); }
  .filter svg { width: 11px; height: 11px; }

  /* ========== TIMELINE ========== */
  .timeline {
    position: relative;
    padding-left: 28px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 5px; top: 10px; bottom: 10px;
    width: 1.5px;
    background: var(--rule);
  }
  .day {
    position: relative;
    margin-bottom: 20px;
  }
  .day::before {
    content: '';
    position: absolute;
    left: -27px; top: 8px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--ink);
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1.5px var(--ink);
  }
  .day-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 14px;
    background: var(--bg);
    display: inline-block;
    padding: 4px 12px;
    border: 1px solid var(--rule);
    border-radius: 999px;
    letter-spacing: 0.04em;
  }
  .day-label strong {
    font-weight: 700;
    color: var(--accent);
    margin-right: 6px;
  }

  /* ========== EVENT CARDS ========== */
  .event {
    display: grid;
    grid-template-columns: 1fr 120px;
    gap: 16px;
    padding: 18px;
    background: var(--paper);
    border: 1.5px solid var(--rule);
    border-radius: 10px;
    margin-bottom: 14px;
    transition: border-color .15s, transform .15s, box-shadow .15s;
    cursor: pointer;
  }
  .event:hover {
    border-color: var(--ink);
    transform: translateY(-2px);
    box-shadow: 4px 4px 0 var(--ink);
  }
  .event-title {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .event-meta {
    display: flex; flex-direction: column; gap: 6px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .event-meta .row {
    display: flex; align-items: center; gap: 8px;
  }
  .event-meta svg { width: 13px; height: 13px; flex-shrink: 0; color: var(--ink-mute); }
  .creator {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  .creator .c-avatar {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    display: grid; place-items: center;
    font-family: 'Anton', sans-serif;
    font-size: 10px;
    color: var(--bg);
    -webkit-text-stroke: 0.8px var(--ink);
    paint-order: stroke fill;
    border: 1px solid var(--ink);
  }
  .event-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(255,79,0,0.08);
    border: 1px solid rgba(255,79,0,0.25);
    padding: 3px 8px;
    border-radius: 4px;
    margin-top: 10px;
  }
  .event-thumb {
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--rule);
    aspect-ratio: 1/1;
    position: relative;
    background: var(--bg-2);
  }
  .event-thumb svg { width: 100%; height: 100%; display: block; }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-mute);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ========== FOOTER ========== */
  .footer {
    padding: 40px 24px;
    border-top: 1px solid var(--rule);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-mute);
    text-transform: uppercase;
  }
  .footer .dot { color: var(--accent); }
  .footer a:hover { color: var(--accent); }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 600px) {
    .event { grid-template-columns: 1fr 88px; gap: 12px; padding: 14px; }
    .event-title { font-size: 15px; }
    .event-thumb { aspect-ratio: 1/1; }
    .profile h1 { font-size: 30px; }
    .tabs { gap: 18px; }
    .tab { font-size: 11px; padding: 12px 2px; }
  }
</style>
</head>

// ============================================================
// Renders the timeline. Filters by upcoming/past using current date.
// ============================================================

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WEEKDAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function parseDate(str) {
  // expects YYYY-MM-DD, local time
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function formatDayLabel(dateObj, isFuture) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateObj); d.setHours(0,0,0,0);
  const diffDays = Math.round((d - today) / 86400000);
  const weekday = WEEKDAYS[d.getDay()];
  const rest = `${weekday}, ${MONTHS[d.getMonth()]}. ${d.getDate()}`;
  if (isFuture && diffDays === 1) return `<strong>Tomorrow</strong> ${rest}`;
  if (diffDays === 0) return `<strong>Today</strong> ${rest}`;
  if (!isFuture && diffDays === -1) return `<strong>Yesterday</strong> ${rest}`;
  return rest;
}

}

function render(showUpcoming) {
  const today = new Date(); today.setHours(0,0,0,0);
  const filtered = EVENTS.filter(e => {
    const d = parseDate(e.date);
    return showUpcoming ? d >= today : d < today;
  });

  // sort: upcoming ascending, past descending
  filtered.sort((a, b) => {
    const da = parseDate(a.date), db = parseDate(b.date);
    return showUpcoming ? da - db : db - da;
  });

  const container = document.getElementById('timeline');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty">No ${showUpcoming ? 'upcoming' : 'past'} events yet. Check back Sunday.</div>`;
    return;
  }

  // group by date
  const groups = {};
  for (const ev of filtered) {
    if (!groups[ev.date]) groups[ev.date] = [];
    groups[ev.date].push(ev);
  }
  const dateKeys = Object.keys(groups);

  container.innerHTML = dateKeys.map(k => {
    const label = formatDayLabel(parseDate(k), showUpcoming);
    const cards = groups[k].map(ev => `
      <a class="event" href="${ev.url}" target="_blank" rel="noopener">
        <div>
          <div class="event-title">${ev.title}</div>
          <div class="event-meta">
            <div class="row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
              <span>${ev.time}</span>
            </div>
            <div class="row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <span>${ev.location}</span>
            </div>
          </div>
          <div class="creator">
            <span class="c-avatar">${ev.creator.initial}</span>
            <span>By ${ev.creator.name}</span>
          </div>
          <span class="event-badge">&rarr; Linked Event</span>
        </div>
        <div class="event-thumb">${thumbSVG(ev.thumb)}</div>
      </a>
    `).join('');
    return `<div class="day"><div class="day-label">${label}</div>${cards}</div>`;
  }).join('');
}

// Filter toggle
let showUpcoming = true;
document.getElementById('filterBtn').addEventListener('click', () => {
  showUpcoming = !showUpcoming;
  document.getElementById('filterLabel').textContent = showUpcoming ? 'Upcoming' : 'Past';
  render(showUpcoming);
});

render(true);
</script>
