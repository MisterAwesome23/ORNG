<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORNG — From the Orange City to the World</title>
    <meta name="description" content="Sustainable, supreme quality products from Nagpur to the world.">
    <meta property="og:title" content="ORNG — From the Orange City to the World">
    <meta property="og:description" content="Sustainable, supreme quality products from Nagpur to the world.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟠</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: #fffefb;
            color: #201515;
            font-family: 'Inter', Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 40px 24px;
        }

        .container {
            text-align: center;
            max-width: 640px;
            width: 100%;
        }

        .wordmark {
            font-family: 'Inter', Helvetica, Arial, sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #939084;
            margin-bottom: 48px;
        }

        .spotify {
            margin-bottom: 48px;
            display: flex;
            justify-content: center;
        }

        .spotify iframe {
            border-radius: 12px;
            max-width: 300px;
            width: 100%;
        }

        .quote {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 32px;
            font-weight: 300;
            font-style: italic;
            line-height: 1.4;
            color: #201515;
            letter-spacing: -0.5px;
            margin-bottom: 64px;
            padding: 0 8px;
        }

        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', Helvetica, Arial, sans-serif;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            padding: 20px 32px;
            border-radius: 8px;
            border: 1px solid;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
            min-width: 180px;
        }

        .btn-primary {
            background-color: #ff4f00;
            color: #fffefb;
            border-color: #ff4f00;
        }

        .btn-primary:hover {
            background-color: #e64700;
            border-color: #e64700;
        }

        .btn-secondary {
            background-color: transparent;
            color: #201515;
            border-color: #c5c0b1;
        }

        .btn-secondary:hover {
            background-color: #eceae3;
            border-color: #c5c0b1;
        }

        .footer {
            position: fixed;
            bottom: 32px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: #c5c0b1;
            letter-spacing: 0.5px;
        }

        @media (max-width: 480px) {
            .quote {
                font-size: 24px;
                margin-bottom: 48px;
            }

            .wordmark {
                margin-bottom: 48px;
            }

            .buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="wordmark">ORNG</p>

        <div class="spotify">
            <iframe src="https://open.spotify.com/embed/track/4HnBNOfnPYCgRzB1dcAi3x?utm_source=generator&theme=0" width="300" height="80" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <p class="quote">"In Buddhism, orange is the color of enlightenment, purity, and the highest state of perfection."</p>

        <div class="buttons">
            <a href="./ORNG-One-Pager.pdf" target="_blank" class="btn btn-secondary">Know More</a>
            <a href="https://chat.whatsapp.com/Hr70c12HRmYAG4GI4pJpaj?mode=gi_t" target="_blank" rel="noopener noreferrer" class="btn btn-primary">Join Us</a>
        </div>
    </div>

    <div class="footer">orng.shop</div>
</body>
</html>
